<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEOCODE Editor</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
/>
<link rel="stylesheet" href="assets/css/editor.css?v=20260707-1" />
</head>
<body class="editor-locked">
  <header class="editor-header">
    <div>
      <strong>NEOCODE Editor</strong>
      <span id="saveState">대기</span>
    </div>
    <nav class="editor-actions">
      <a class="icon-button" href="/index.html" target="_blank" rel="noreferrer" title="홈페이지 열기">↗</a>
      <button class="icon-button" id="reloadContent" type="button" title="새로고침">↻</button>
      <button class="save-button" id="saveContent" type="button">저장</button>
    </nav>
  </header>

  <main class="editor-shell">
    <aside class="editor-sidebar" id="editorTabs">
      <button type="button" data-panel="site" class="active">기본</button>
      <button type="button" data-panel="hero">HOME</button>
      <button type="button" data-panel="apps">Apps</button>
      <button type="button" data-panel="process">Process</button>
      <button type="button" data-panel="games">Games</button>
      <button type="button" data-panel="about">ABOUT</button>
      <button type="button" data-panel="contact">CONTACT</button>
      <button type="button" data-panel="footer">Footer</button>
      <button type="button" data-panel="json">JSON</button>
    </aside>

    <section class="editor-workspace">
      <form id="editorForm" class="editor-form"></form>
    </section>
  </main>

  <div class="save-toast" id="saveToast" role="status" aria-live="polite" hidden>
    저장되었습니다.
  </div>

  <div class="editor-lock" id="editorLock" role="dialog" aria-modal="true" aria-labelledby="editorLockTitle">
    <form class="editor-lock-box" id="editorLockForm">
      <span class="lock-kicker">NEOCODE Editor</span>
      <h1 id="editorLockTitle">비밀번호 입력</h1>
      <label class="field">
        <span>비밀번호</span>
        <input id="editorPassword" type="password" autocomplete="current-password" autofocus />
      </label>
      <p class="lock-error" id="editorLockError" hidden>비밀번호가 올바르지 않습니다.</p>
      <button class="save-button" type="submit">확인</button>
    </form>
  </div>

  <script type="module" src="assets/js/editor.js?v=20260707-1"></script>
</body>
</html>
