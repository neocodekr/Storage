<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>앱 다운로드 목록 편집</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --head: #eef3f8;
      --primary: #1463ff;
      --primary-dark: #0d47bd;
      --danger: #d92d20;
      --danger-bg: #fff1f0;
      --success: #027a48;
      --success-bg: #ecfdf3;
      --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtext {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .main-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .form-panel,
    .toolbar,
    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .form-panel {
      padding: 20px;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(260px, 2fr) auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 7px;
      color: #344054;
      font-size: 14px;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(20, 99, 255, 0.14);
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      white-space: nowrap;
    }

    .save-button,
    .file-button {
      padding: 0 18px;
      background: var(--primary);
      color: #ffffff;
    }

    .save-button:hover,
    .file-button:hover {
      background: var(--primary-dark);
    }

    .secondary-button {
      padding: 0 14px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      margin-bottom: 18px;
    }

    .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status {
      min-width: 180px;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 15px;
    }

    th {
      background: var(--head);
      color: #344054;
      font-size: 14px;
      font-weight: 800;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .number {
      width: 80px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .app-name {
      font-weight: 800;
    }

    .url-cell {
      max-width: 420px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .delete-button {
      min-height: 36px;
      padding: 0 12px;
      background: var(--danger-bg);
      color: var(--danger);
    }

    .empty {
      padding: 44px 18px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 20px, 1100px);
        padding: 24px 0;
      }

      .topbar,
      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .status {
        min-width: 0;
        text-align: left;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>목록 편집</h1>
        <p class="subtext">앱 이름과 다운로드 URL을 관리합니다.</p>
      </div>
      <a class="main-link" href="index.html">메인 페이지</a>
    </header>

    <section class="form-panel" aria-label="앱 추가">
      <form id="appForm" class="form-grid">
        <label>
          앱 이름
          <input id="appName" type="text" placeholder="예: 업무용 앱" autocomplete="off" required>
        </label>
        <label>
          다운로드 URL
          <input id="appUrl" type="text" placeholder="https://example.com/app.apk" autocomplete="off" required>
        </label>
        <button class="save-button" type="submit">추가</button>
      </form>
    </section>

    <section class="toolbar" aria-label="파일 관리">
      <div class="toolbar-actions">
        <button id="loadFileButton" class="secondary-button" type="button">apps.json 열기</button>
        <button id="saveFileButton" class="file-button" type="button">apps.json 저장</button>
        <button id="reloadButton" class="secondary-button" type="button">apps.json 다시 읽기</button>
      </div>
      <div id="status" class="status" role="status">대기 중</div>
    </section>

    <section class="table-wrap" aria-label="등록된 앱 목록">
      <table>
        <thead>
          <tr>
            <th class="number">번호</th>
            <th>앱 이름</th>
            <th>다운로드 URL</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="appTableBody"></tbody>
      </table>
      <div id="emptyState" class="empty" hidden>등록된 앱이 없습니다.</div>
    </section>
  </main>

  <script>
    const DATA_FILE = "apps.json";
    let apps = [];
    let openedFileHandle = null;

    function normalizeApps(data) {
      const list = Array.isArray(data) ? data : data?.apps;
      if (!Array.isArray(list)) {
        return [];
      }

      return list
        .map((app) => ({
          name: String(app?.name || "").trim(),
          url: String(app?.url || "").trim(),
        }))
        .filter((app) => app.name && /^https?:\/\//i.test(app.url));
    }

    function setStatus(message, type = "") {
      const status = document.getElementById("status");
      status.textContent = message;
      status.className = `status ${type}`.trim();
    }

    async function loadServerApps() {
      try {
        const response = await fetch(`${DATA_FILE}?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          return [];
        }
        return normalizeApps(await response.json());
      } catch (error) {
        console.error("apps.json을 불러오지 못했습니다.", error);
        return [];
      }
    }

    function normalizeUrl(url) {
      const trimmedUrl = url.trim();
      if (/^https?:\/\//i.test(trimmedUrl)) {
        return trimmedUrl;
      }
      return `https://${trimmedUrl}`;
    }

    function isValidUrl(url) {
      try {
        const parsedUrl = new URL(url);
        return parsedUrl.protocol === "http:" || parsedUrl.protocol === "https:";
      } catch {
        return false;
      }
    }

    function toJson() {
      return `${JSON.stringify(apps, null, 2)}\n`;
    }

    function downloadJson() {
      const blob = new Blob([toJson()], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = DATA_FILE;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function writeJsonFile() {
      if ("showSaveFilePicker" in window) {
        if (!openedFileHandle) {
          openedFileHandle = await window.showSaveFilePicker({
            suggestedName: DATA_FILE,
            types: [
              {
                description: "JSON",
                accept: { "application/json": [".json"] },
              },
            ],
          });
        }

        const writable = await openedFileHandle.createWritable();
        await writable.write(toJson());
        await writable.close();
        setStatus("apps.json 저장 완료", "success");
        return;
      }

      downloadJson();
      setStatus("apps.json 다운로드 완료", "success");
    }

    function readSelectedFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file, "utf-8");
      });
    }

    async function openJsonFileFallback() {
      return new Promise((resolve) => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json,application/json";
        input.addEventListener("change", async () => {
          const file = input.files?.[0];
          if (!file) {
            resolve(null);
            return;
          }
          resolve(await readSelectedFile(file));
        }, { once: true });
        input.click();
      });
    }

    async function openJsonFile() {
      try {
        let text = null;
        if ("showOpenFilePicker" in window) {
          const [fileHandle] = await window.showOpenFilePicker({
            multiple: false,
            types: [
              {
                description: "JSON",
                accept: { "application/json": [".json"] },
              },
            ],
          });
          openedFileHandle = fileHandle;
          text = await (await fileHandle.getFile()).text();
        } else {
          text = await openJsonFileFallback();
        }

        if (text === null) {
          return;
        }

        apps = normalizeApps(JSON.parse(text));
        renderApps();
        setStatus("apps.json 불러오기 완료", "success");
      } catch (error) {
        console.error("apps.json을 열지 못했습니다.", error);
        setStatus("apps.json 불러오기 실패", "error");
      }
    }

    function renderApps() {
      const tableBody = document.getElementById("appTableBody");
      const emptyState = document.getElementById("emptyState");

      tableBody.innerHTML = "";
      emptyState.hidden = apps.length > 0;

      apps.forEach((app, index) => {
        const row = document.createElement("tr");

        const numberCell = document.createElement("td");
        numberCell.className = "number";
        numberCell.textContent = index + 1;

        const nameCell = document.createElement("td");
        nameCell.className = "app-name";
        nameCell.textContent = app.name;

        const urlCell = document.createElement("td");
        urlCell.className = "url-cell";
        urlCell.textContent = app.url;

        const actionCell = document.createElement("td");
        const deleteButton = document.createElement("button");
        deleteButton.className = "delete-button";
        deleteButton.type = "button";
        deleteButton.textContent = "삭제";
        deleteButton.addEventListener("click", () => {
          apps = apps.filter((_, appIndex) => appIndex !== index);
          renderApps();
          setStatus("삭제 완료, 저장 필요", "success");
        });
        actionCell.appendChild(deleteButton);

        row.append(numberCell, nameCell, urlCell, actionCell);
        tableBody.appendChild(row);
      });
    }

    document.getElementById("appForm").addEventListener("submit", (event) => {
      event.preventDefault();

      const nameInput = document.getElementById("appName");
      const urlInput = document.getElementById("appUrl");
      const name = nameInput.value.trim();
      const url = normalizeUrl(urlInput.value);

      if (!name || !url || !isValidUrl(url)) {
        urlInput.focus();
        urlInput.setCustomValidity("올바른 다운로드 URL을 입력하세요.");
        urlInput.reportValidity();
        urlInput.setCustomValidity("");
        return;
      }

      apps.push({ name, url });
      renderApps();
      setStatus("추가 완료, 저장 필요", "success");

      event.target.reset();
      nameInput.focus();
    });

    document.getElementById("loadFileButton").addEventListener("click", openJsonFile);
    document.getElementById("saveFileButton").addEventListener("click", async () => {
      try {
        await writeJsonFile();
      } catch (error) {
        console.error("apps.json을 저장하지 못했습니다.", error);
        downloadJson();
        setStatus("apps.json 다운로드 완료", "success");
      }
    });
    document.getElementById("reloadButton").addEventListener("click", async () => {
      apps = await loadServerApps();
      openedFileHandle = null;
      renderApps();
      setStatus("apps.json 다시 읽기 완료", "success");
    });

    async function initialize() {
      apps = await loadServerApps();
      renderApps();
    }

    initialize();
  </script>
</body>
</html>
