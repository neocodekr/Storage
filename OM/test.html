<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스마트스토어 상세페이지 - LED 무선 휴대용 선풍기</title>
<style>
  /* 기본 스타일 */
  body {
    font-family: 'Malgun Gothic', sans-serif;
    margin: 0;
    padding: 0;
    color: #333;
    line-height: 1.6;
  }
  .container {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    box-sizing: border-box;
  }
  
  /* 섹션 공통 스타일 */
  .section {
    margin-bottom: 40px;
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  .section-title {
    font-size: 24px;
    font-weight: bold;
    color: #4a4a4a;
    margin-bottom: 10px;
    text-align: center;
  }
  .section-subtitle {
    font-size: 16px;
    color: #888;
    margin-bottom: 20px;
    text-align: center;
  }
  .image-container {
    text-align: center;
    margin-bottom: 20px;
  }
  .image-container img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto;
    border-radius: 8px;
  }
  
  /* 섹션 3: 디테일 포인트 */
  .detail-highlight {
    font-size: 18px;
    font-weight: bold;
    color: #c4a77d;
    margin-bottom: 10px;
    text-align: center;
  }
  .detail-list {
    max-width: 500px;
    margin: 0 auto;
  }
  
  /* 반응형 */
  @media (max-width: 600px) {
    .container {
      padding: 10px;
    }
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="section overview">
    <h1 class="section-title">올여름 필수템! 나만의 작은 오아시스</h1>
    <p class="section-subtitle">탁상용 & 목걸이형 2Way, LED 디스플레이 탑재</p>
    
    <div class="image-container">
      <img src="https://neocode.cloud/OM/main1.png" alt="제품 형태 소개 및 주요 기능">
    </div>
  </div>
  
  <div class="section scenarios">
    <h2 class="section-title">언제 어디서나 간편하게!</h2>
    <p class="section-subtitle">일상 속 다양한 순간, 시원함을 선물하세요.</p>
    
    <div class="image-container scenario-image">
      <img src="https://neocode.cloud/OM/main2.png" alt="탁상 및 목걸이 활용 시나리오">
    </div>
  </div>
  
  <div class="section details">
    <h2 class="section-title">디테일이 살아있는 프리미엄 디자인</h2>
    <p class="section-subtitle">단순한 선풍기를 넘어선 세련된 소품</p>
    
    <div class="image-container detail-image">
      <img src="https://neocode.cloud/OM/main3.png" alt="제품 디테일 및 강력한 기능">
    </div>
    
    <div class="detail-highlight">프리미엄 포인트 3가지</div>
    <ul class="detail-list">
      <li><strong>LED 디스플레이</strong>: 배터 잔량을 한눈에 직관적으로 확인하세요.</li>
      <li><strong>강력한 배터리 수명</strong>: 오랫동안 지속되는 시원함을 경험해 보세요.</li>
      <li><strong>정밀한 디자인</strong>: 미니멀하면서도 고급스러운 골드 포인트 디테일.</li>
    </ul>
  </div>
  
</div>

</body>
</html>
